services:
  app:
    build: .
    container_name: research-agent-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --loop asyncio

  mcp:
    build: .
    container_name: research-agent-mcp
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    command: python -m mcp_server.server

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: research-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: